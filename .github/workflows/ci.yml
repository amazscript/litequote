name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  php-lint:
    name: PHP Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}

      - name: PHP Syntax Check
        run: |
          find litequote -name "*.php" -not -path "*/lib/fpdf/*" | while read file; do
            php -l "$file" || exit 1
          done

  js-css-check:
    name: Assets Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JS file size
        run: |
          JS_SIZE=$(wc -c < litequote/assets/js/litequote-modal.js)
          echo "JS size: ${JS_SIZE} bytes ($(( JS_SIZE / 1024 )) KB)"

      - name: Check CSS file size
        run: |
          CSS_SIZE=$(wc -c < litequote/assets/css/litequote.css)
          echo "CSS size: ${CSS_SIZE} bytes ($(( CSS_SIZE / 1024 )) KB)"

  plugin-size:
    name: Plugin Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check plugin size (without FPDF)
        run: |
          TOTAL=$(find litequote -not -path "*/lib/fpdf/*" -type f -exec cat {} + | wc -c)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Plugin size (without FPDF): ${TOTAL_KB} KB"
          # Budget: 300 KB (includes 7 languages ~100 KB)
          if [ "$TOTAL_KB" -gt 300 ]; then
            echo "::error::Plugin exceeds 300 KB budget (${TOTAL_KB} KB)"
            exit 1
          fi
          echo "Within budget"

      - name: Check total size (with FPDF)
        run: |
          TOTAL=$(du -sb litequote | cut -f1)
          TOTAL_KB=$((TOTAL / 1024))
          echo "Total plugin size (with FPDF): ${TOTAL_KB} KB"

  build-zip:
    name: Build Release ZIP
    runs-on: ubuntu-latest
    needs: [php-lint, js-css-check, plugin-size]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ZIP
        run: |
          cd litequote
          zip -r ../litequote.zip . \
            -x "includes/class-litequote-smtp-dev.php" \
            -x ".DS_Store" \
            -x "*/.DS_Store" \
            -x "*.po~"

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: litequote-plugin
          path: litequote.zip

      - name: Show ZIP info
        run: |
          ls -lh litequote.zip
          echo "Files: $(unzip -l litequote.zip | tail -1)"

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build
